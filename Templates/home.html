<!DOCTYPE html>
<html>
    <head>
        <title>Aurèle</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family: Georgia, serif;
                background-color: #fff9f9;
                color: #2c0a0a;
            }
            header {
                background-color: #7B1020;
                padding: 40px 20px;
                text-align: center;
            }
            .header-sub {
                font-size: 11px;
                letter-spacing: 6px;
                color: #e8b4bc;
                text-transform: uppercase;
                margin-bottom: 8px;
            }
            header h1 {
                font-size: 48px;
                letter-spacing: 12px;
                color: #ffffff;
                text-transform: uppercase;
                font-weight: normal;
            }
            .header-tag {
                font-size: 10px;
                letter-spacing: 8px;
                color: #e8b4bc;
                text-transform: uppercase;
                margin-top: 8px;
            }
            .container {
                max-width: 650px;
                margin: 40px auto;
                padding: 0 24px;
            }
            .search-bar {
                display: flex;
                gap: 10px;
                margin-bottom: 28px;
            }
            .search-bar input {
                flex: 1;
                padding: 10px 16px;
                border: 1px solid #c8a0a6;
                font-family: Georgia, serif;
                font-size: 13px;
                outline: none;
                background: #fff;
                color: #333;
            }
            .search-bar button {
                background: #7B1020;
                color: white;
                border: none;
                padding: 10px 22px;
                font-family: Georgia, serif;
                font-size: 13px;
                letter-spacing: 1px;
                cursor: pointer;
            }
            .section-label {
                font-size: 10px;
                letter-spacing: 4px;
                color: #7B1020;
                text-transform: uppercase;
                margin-bottom: 16px;
                border-bottom: 1px solid #f0dde0;
                padding-bottom: 10px;
            }
            ul {
                list-style: none;
                padding: 0;
                margin: 0;
            }
            li {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 14px 0;
                border-bottom: 1px solid #f5e8ea;
            }
            li span {
                font-size: 14px;
                color: #2c0a0a;
                letter-spacing: 1px;
            }
            li button {
                background: none;
                border: 1px solid #c8a0a6;
                color: #7B1020;
                padding: 5px 14px;
                font-family: Georgia, serif;
                font-size: 11px;
                letter-spacing: 1px;
                cursor: pointer;
            }
            li button:hover {
                background: #7B1020;
                color: white;
            }
            .add-form {
                display: flex;
                gap: 10px;
                margin-top: 28px;
                padding-top: 20px;
                border-top: 1px solid #f0dde0;
            }
            .add-form input {
                flex: 1;
                padding: 10px 16px;
                border: 1px solid #c8a0a6;
                font-family: Georgia, serif;
                font-size: 13px;
                outline: none;
                background: #fff;
                color: #333;
            }
            .add-form button {
                background: #7B1020;
                color: white;
                border: none;
                padding: 10px 22px;
                font-family: Georgia, serif;
                font-size: 13px;
                letter-spacing: 1px;
                cursor: pointer;
            }
            footer {
                text-align: center;
                padding: 30px;
                border-top: 1px solid #f0dde0;
                margin-top: 60px;
                font-size: 10px;
                letter-spacing: 4px;
                color: #c8a0a6;
                text-transform: uppercase;
            }
            .product-count {
                font-size: 11px;
                letter-spacing: 3px;
                color: #ca80a6;
                text-transform: uppercase;
                margin-bottom: 16px;
            }
        </style>
    </head>
    <body>
        <header>
            <div class="header-sub">Modest Fashion & Aesthetic Lifestyle</div>
            <h1>Aurèle</h1>
            <div class="header-tag">Clothing</div>
        </header>
        <div class="container">
            <form action="/search" method="post" class="search-bar">
                <input type="text" name="query" placeholder="Search products...">
                <button type="submit">Search</button>
            </form>
            <div class="section-label">Collection</div>
            <p class="product-count">{{products|length}} products in collection</p>
            <ul>
                {% for product in products %}
                <li>
                    <span>{{ product }}</span>
                    <form action="/remove" method="post" style="display:inline">
                        <input type="hidden" name="product" value="{{ product }}">
                        <button type="submit">Remove</button>
                    </form>
                </li>
                {% endfor %}
            </ul>
            <form action="/add" method="post" class="add-form">
                <input type="text" name="product" placeholder="Add a new product...">
                <button type="submit">Add</button>
            </form>
        </div>
        <footer>© 2026 Aurèle · All Rights Reserved</footer>
    </body>
</html>
